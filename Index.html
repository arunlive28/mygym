<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gym Routine PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #222222;
            --panel-bg: #333333;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --orange: #FF7F50;
            --red: #E63946;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; }

        /* Header */
        header { background-color: var(--panel-bg); padding: 20px; text-align: center; border-bottom: 3px solid var(--orange); }
        header h1 { font-size: 1.5rem; color: var(--orange); text-transform: uppercase; letter-spacing: 2px; }

        /* Tabs */
        .tab-nav { display: flex; background-color: var(--panel-bg); }
        .tab-btn { flex: 1; padding: 15px 0; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: var(--text-main); border-bottom: 2px solid var(--orange); }

        /* Content Area */
        .content { flex: 1; overflow-y: auto; padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Typography & Elements */
        h2 { margin-bottom: 15px; font-weight: 500; }
        select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: none; font-size: 1rem; }
        select { background-color: var(--panel-bg); color: var(--text-main); border: 1px solid var(--text-muted); }
        button { background-color: var(--orange); color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #e06c45; }
        button.danger { background-color: var(--red); }
        button.danger:hover { background-color: #c7323d; }

        /* Lists */
        .list-item { background-color: var(--panel-bg); padding: 15px; border-radius: 5px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border-left: 4px solid var(--orange); }
        .checkbox-label { display: flex; align-items: center; gap: 10px; width: 100%; cursor: pointer; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--orange); }
        
        .empty-state { text-align: center; color: var(--text-muted); margin-top: 50px; font-style: italic; }

        /* Hidden File Input */
        #import-file { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>My Routine</h1>
    </header>

    <div class="tab-nav">
        <button class="tab-btn active" onclick="openTab('main')">Today</button>
        <button class="tab-btn" onclick="openTab('edit')">Edit</button>
        <button class="tab-btn" onclick="openTab('manage')">Data</button>
    </div>

    <div class="content">
        <div id="main" class="tab-content active">
            <h2 id="today-title">Today's Workout</h2>
            <div id="today-routine-list"></div>
        </div>

        <div id="edit" class="tab-content">
            <h2>Edit Routine</h2>
            <select id="day-select" onchange="renderEditList()">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday">Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
            </select>
            <div id="edit-exercise-list"></div>
            <button onclick="saveRoutine()">Save Day's Routine</button>
        </div>

        <div id="manage" class="tab-content">
            <h2>Manage Exercises</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px; font-size: 0.9rem;">
                Export your available exercises to a JSON file, or import a new list.
            </p>
            <button onclick="exportJSON()">Export Exercises (JSON)</button>
            
            <button class="danger" onclick="document.getElementById('import-file').click()">Import Exercises (JSON)</button>
            <input type="file" id="import-file" accept=".json" onchange="importJSON(event)">
            
            <h2 style="margin-top: 30px;">Current Database</h2>
            <div id="database-preview" style="background: var(--panel-bg); padding: 10px; border-radius: 5px; font-size: 0.85rem; color: var(--text-muted); max-height: 150px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        
        // Default Data
        let exercises = JSON.parse(localStorage.getItem('gym_exercises')) || [
            "Bench Press", "Squat", "Deadlift", "Overhead Press", "Barbell Row", "Pull-ups", "Bicep Curls", "Tricep Extensions", "Leg Press", "Rest Day"
        ];
        
        let routine = JSON.parse(localStorage.getItem('gym_routine')) || {
            Monday: [], Tuesday: [], Wednesday: [], Thursday: [], Friday: [], Saturday: [], Sunday: []
        };

        function saveData() {
            localStorage.setItem('gym_exercises', JSON.stringify(exercises));
            localStorage.setItem('gym_routine', JSON.stringify(routine));
            renderDatabasePreview();
        }

        // Tab Navigation
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');

            if(tabId === 'main') renderToday();
            if(tabId === 'edit') renderEditList();
        }

        // Main Tab Logic
        function renderToday() {
            const today = days[new Date().getDay()];
            document.getElementById('today-title').innerText = `${today}'s Workout`;
            
            const listContainer = document.getElementById('today-routine-list');
            listContainer.innerHTML = '';

            const todaysExercises = routine[today] || [];
            
            if (todaysExercises.length === 0) {
                listContainer.innerHTML = `<div class="empty-state">No exercises planned for today. Enjoy your rest or edit your routine!</div>`;
                return;
            }

            todaysExercises.forEach(ex => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<span style="font-size: 1.1rem; font-weight: bold;">${ex}</span>`;
                listContainer.appendChild(div);
            });
        }

        // Edit Tab Logic
        function renderEditList() {
            const selectedDay = document.getElementById('day-select').value;
            const activeRoutine = routine[selectedDay] || [];
            const listContainer = document.getElementById('edit-exercise-list');
            listContainer.innerHTML = '';

            exercises.forEach(ex => {
                const isChecked = activeRoutine.includes(ex) ? 'checked' : '';
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <label class="checkbox-label">
                        <input type="checkbox" value="${ex}" ${isChecked}>
                        ${ex}
                    </label>
                `;
                listContainer.appendChild(div);
            });
        }

        function saveRoutine() {
            const selectedDay = document.getElementById('day-select').value;
            const checkboxes = document.querySelectorAll('#edit-exercise-list input[type="checkbox"]:checked');
            const selectedExercises = Array.from(checkboxes).map(cb => cb.value);
            
            routine[selectedDay] = selectedExercises;
            saveData();
            alert(`${selectedDay} routine saved successfully!`);
        }

        // Manage Tab Logic (JSON Import/Export)
        function renderDatabasePreview() {
            document.getElementById('database-preview').innerText = exercises.join(', ');
        }

        function exportJSON() {
            const dataStr = JSON.stringify(exercises, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "gym_exercises_backup.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        exercises = importedData;
                        saveData();
                        renderEditList(); // Refresh lists
                        alert("Exercises imported successfully!");
                    } else {
                        alert("Invalid JSON format. Expected an array of exercise strings.");
                    }
                } catch (error) {
                    alert("Error parsing JSON file.");
                }
                event.target.value = ''; // Reset input
            };
            reader.readAsText(file);
        }

        // Initialization
        window.onload = () => {
            saveData();
            renderToday();
            
            // Service Worker Registration
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker Registered"))
                .catch(err => console.error("Service Worker Failed", err));
            }
        };
    </script>
</body>
</html>
